<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zenote — a notes app</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #090D16;
    --bg-tex: #151F32;
    --card: #151F32;
    --card-edge: #22314C;
    --ink: #F1F5F9;
    --ink-soft: #94A3B8;
    --rust: #10B981;
    --sage: #06B6D4;
    --line: rgba(255, 255, 255, 0.08);
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    background-image: radial-gradient(circle at 50% 50%, var(--bg-tex) 0%, var(--bg) 100%);
    color: var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    padding: 40px 20px 80px;
  }
  .wrap{ max-width: 920px; margin: 0 auto; }

  header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }
  .title{
    font-family:'Plus Jakarta Sans', sans-serif;
    font-weight:800;
    font-size: 28px;
    letter-spacing:-0.02em;
    color: var(--ink);
  }
  .title em{ color: var(--rust); font-style:normal; }
  .count{
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
  }

  /* ---- search ---- */
  .searchbar{ margin-bottom: 22px; position:relative; }
  .searchbar input{
    width:100%;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--card-edge);
    border-radius: 6px;
    padding: 12px 14px 12px 38px;
    color: var(--ink);
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
    outline:none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .searchbar input::placeholder{ color: var(--ink-soft); }
  .searchbar input:focus{
    border-color: var(--rust);
    box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
  }
  .searchbar svg{ position:absolute; left:12px; top:50%; transform:translateY(-50%); opacity:0.55; }

  /* ---- composer ---- */
  .composer{
    background: var(--card);
    color: var(--ink);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 34px;
    border: 1px solid var(--card-edge);
    box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
  }
  .composer h2{
    margin:0 0 16px;
    font-family:'Plus Jakarta Sans', sans-serif;
    font-size:18px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .field{ margin-bottom: 14px; }
  .field label{
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .field input[type="text"], .field textarea{
    width:100%;
    background: rgba(9, 13, 22, 0.6);
    border: 1px solid var(--card-edge);
    border-radius: 6px;
    padding: 12px 14px;
    font-family:'Inter', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline:none;
    resize: vertical;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .field textarea{ min-height: 100px; line-height:1.6; }
  .field input[type="text"]:focus, .field textarea:focus{
    border-color: var(--rust);
    box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
  }
  .field.has-error input, .field.has-error textarea{
    border-color: #EF4444;
    background: rgba(239, 68, 68, 0.05);
  }
  .field-error{
    display:none;
    align-items:center;
    gap:5px;
    margin-top:6px;
    font-family:'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: #EF4444;
  }
  .field.has-error .field-error{ display:flex; }

  .composer-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
  }
  button{ font-family:'Inter', sans-serif; cursor:pointer; }
  .btn-primary{
    background: var(--rust);
    color: #090D16;
    border:none;
    border-radius:6px;
    padding: 10px 22px;
    font-size: 13.5px;
    font-weight:600;
    transition: background-color 0.2s ease, transform 0.1s ease;
  }
  .btn-primary:hover{ background: #34D399; }
  .btn-primary:active{ transform: scale(0.98); }
  .btn-ghost{
    background:none;
    border: 1px solid var(--card-edge);
    color: var(--ink-soft);
    border-radius:6px;
    padding: 10px 18px;
    font-size: 13.5px;
    transition: all 0.2s ease;
  }
  .btn-ghost:hover{
    border-color: var(--ink-soft);
    color: var(--ink);
    background: rgba(255, 255, 255, 0.03);
  }
  button:focus-visible{ outline: 2px solid var(--rust); outline-offset:2px; }

  /* ---- notes grid ---- */
  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 18px;
  }
  .note{
    background: var(--card);
    color: var(--ink);
    border-radius: 8px;
    border: 1px solid var(--card-edge);
    padding: 20px 20px 16px;
    position:relative;
    box-shadow: 0 4px 20px -10px rgba(0,0,0,0.3);
    transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s ease, border-color 0.2s ease;
    display:flex;
    flex-direction:column;
    min-height: 160px;
  }
  .note:hover{
    transform: translateY(-4px);
    border-color: var(--rust);
    box-shadow: 0 12px 30px -10px rgba(0,0,0,0.5);
  }
  .note h3{
    font-family:'Plus Jakarta Sans', sans-serif;
    font-size: 18px;
    font-weight:700;
    margin: 0 0 10px;
    word-break: break-word;
    color: var(--ink);
  }
  .note p{
    font-size: 14px;
    line-height:1.6;
    color: var(--ink-soft);
    margin:0 0 16px;
    white-space:pre-wrap;
    word-break: break-word;
    flex:1;
  }
  .note-meta{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-top: 1px solid var(--line);
    padding-top: 12px;
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
  }
  .note-actions{ display:flex; gap:10px; }
  .icon-btn{
    background:none; border:none; padding:2px;
    color: var(--ink-soft);
    display:flex;
    transition: color 0.2s ease;
  }
  .icon-btn:hover{ color: #EF4444; }
  .icon-btn.edit:hover{ color: var(--rust); }

  /* edit mode inline */
  .note.editing .display{ display:none; }
  .note .edit-form{ display:none; flex-direction:column; gap:10px; flex:1; }
  .note.editing .edit-form{ display:flex; }

  .empty-state{
    grid-column: 1 / -1;
    text-align:center;
    padding: 60px 20px;
    color: var(--ink-soft);
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
  }

  footer.note-app-footer{
    margin-top: 30px;
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    opacity: 0.6;
  }

  @media (max-width:520px){
    .composer-actions{ flex-direction:column-reverse; }
    .composer-actions button{ width:100%; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="title">Zenote<em>.</em></div>
    </div>
    <div class="count" id="noteCount">0 notes</div>
  </header>

  <div class="searchbar">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="var(--ink-soft)" stroke-width="1.8"/><path d="M21 21l-4.3-4.3" stroke="var(--ink-soft)" stroke-width="1.8" stroke-linecap="round"/></svg>
    <input type="text" id="searchInput" placeholder="search notes by title or content…" autocomplete="off" />
  </div>

  <div class="composer">
    <h2>New note</h2>
    <form id="newNoteForm" novalidate>
      <div class="field" id="titleField">
        <label for="titleInput">Title</label>
        <input type="text" id="titleInput" maxlength="80" placeholder="Give it a name" />
        <div class="field-error">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#EF4444" stroke-width="2"/><path d="M12 7v6" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="16.5" r="1" fill="#EF4444"/></svg>
          <span>Title can't be empty.</span>
        </div>
      </div>
      <div class="field" id="contentField">
        <label for="contentInput">Content</label>
        <textarea id="contentInput" placeholder="Write something…"></textarea>
        <div class="field-error">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#EF4444" stroke-width="2"/><path d="M12 7v6" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="16.5" r="1" fill="#EF4444"/></svg>
          <span>Content can't be empty.</span>
        </div>
      </div>
      <div class="composer-actions">
        <button type="submit" class="btn-primary">Add note</button>
      </div>
    </form>
  </div>

  <div class="grid" id="grid"></div>

  <footer class="note-app-footer">Saved locally in your browser — nothing leaves this tab.</footer>
</div>

<script>
const STORAGE_KEY = 'zenote-notes:v1';

const grid = document.getElementById('grid');
const noteCount = document.getElementById('noteCount');
const searchInput = document.getElementById('searchInput');
const form = document.getElementById('newNoteForm');
const titleInput = document.getElementById('titleInput');
const contentInput = document.getElementById('contentInput');
const titleField = document.getElementById('titleField');
const contentField = document.getElementById('contentField');

// ---------- storage layer ----------
function loadNotes(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  }catch(e){
    console.error('Failed to read notes from localStorage', e);
    return [];
  }
}

function saveNotes(notes){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    hideStorageWarning();
  }catch(e){
    console.error('Failed to save notes to localStorage', e);
    showStorageWarning();
  }
}

function showStorageWarning(){
  let banner = document.getElementById('storageWarning');
  if(!banner){
    banner = document.createElement('div');
    banner.id = 'storageWarning';
    banner.style.cssText = 'background:#EF4444;color:#F8FAFC;font-family:JetBrains Mono,monospace;font-size:12px;padding:10px 14px;border-radius:6px;margin-bottom:18px;';
    banner.textContent = "Couldn't save to this browser's storage — your notes will only last for this session.";
    document.querySelector('.searchbar').insertAdjacentElement('beforebegin', banner);
  }
}
function hideStorageWarning(){
  document.getElementById('storageWarning')?.remove();
}

let notes = loadNotes();
let query = '';

function uid(){
  return 'n_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
}

function relativeTime(iso){
  const then = new Date(iso).getTime();
  const diffSec = Math.round((Date.now() - then) / 1000);
  if(diffSec < 10) return 'just now';
  if(diffSec < 60) return `${diffSec}s ago`;
  const diffMin = Math.round(diffSec / 60);
  if(diffMin < 60) return `${diffMin}m ago`;
  const diffHr = Math.round(diffMin / 60);
  if(diffHr < 24) return `${diffHr}h ago`;
  const diffDay = Math.round(diffHr / 24);
  if(diffDay < 7) return `${diffDay}d ago`;
  return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

const tilts = [-1.4, 1.1, -0.6, 1.8, 0.3, -1.9, 0.9];
function tiltFor(index){ return tilts[index % tilts.length]; }

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function render(){
  const q = query.trim().toLowerCase();
  const filtered = notes
    .filter(n => !q || n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q))
    .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

  noteCount.textContent = `${notes.length} note${notes.length === 1 ? '' : 's'}`;

  if(notes.length === 0){
    grid.innerHTML = `<div class="empty-state">No notes yet. Add your first one above.</div>`;
    return;
  }
  if(filtered.length === 0){
    grid.innerHTML = `<div class="empty-state">Nothing matches "${escapeHtml(query)}".</div>`;
    return;
  }

  grid.innerHTML = filtered.map((n, i) => `
    <div class="note" style="--tilt:${tiltFor(i)}deg" data-id="${n.id}">
      <div class="display">
        <h3>${escapeHtml(n.title)}</h3>
        <p>${escapeHtml(n.content)}</p>
        <div class="note-meta">
          <span>Edited ${relativeTime(n.updatedAt)}</span>
          <div class="note-actions">
            <button class="icon-btn edit" title="Edit" data-action="edit">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 20h9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
            </button>
            <button class="icon-btn" title="Delete" data-action="delete">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M4 7h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M9 7V4h6v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 7l1 13h10l1-13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="icon-btn confirm-delete" title="Click again to confirm" data-action="confirm-delete" style="display:none; color:#EF4444; font-family:'JetBrains Mono',monospace; font-size:10px; white-space:nowrap;">sure?</button>
          </div>
        </div>
      </div>
      <form class="edit-form" data-action="save-edit">
        <div class="field">
          <input type="text" class="edit-title" value="${escapeHtml(n.title)}" maxlength="80" />
          <div class="field-error"><span>Title can't be empty.</span></div>
        </div>
        <div class="field">
          <textarea class="edit-content" rows="4">${escapeHtml(n.content)}</textarea>
          <div class="field-error"><span>Content can't be empty.</span></div>
        </div>
        <div class="composer-actions">
          <button type="button" class="btn-ghost" data-action="cancel-edit">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </div>
  `).join('');
}

// ---------- validation ----------
function setError(fieldEl, hasError){
  fieldEl.classList.toggle('has-error', hasError);
}

function validateNewNote(){
  const titleOk = titleInput.value.trim().length > 0;
  const contentOk = contentInput.value.trim().length > 0;
  setError(titleField, !titleOk);
  setError(contentField, !contentOk);
  return titleOk && contentOk;
}

titleInput.addEventListener('input', () => {
  if(titleInput.value.trim().length > 0) setError(titleField, false);
});
contentInput.addEventListener('input', () => {
  if(contentInput.value.trim().length > 0) setError(contentField, false);
});

form.addEventListener('submit', (e) => {
  e.preventDefault();
  if(!validateNewNote()) return;

  const now = new Date().toISOString();
  notes.push({
    id: uid(),
    title: titleInput.value.trim(),
    content: contentInput.value.trim(),
    createdAt: now,
    updatedAt: now,
  });
  saveNotes(notes);
  form.reset();
  setError(titleField, false);
  setError(contentField, false);
  render();
});

// ---------- grid interactions (edit / delete / save) ----------
grid.addEventListener('click', (e) => {
  const card = e.target.closest('.note');
  if(!card) return;
  const id = card.dataset.id;
  const action = e.target.closest('[data-action]')?.dataset.action;

  if(action === 'delete'){
    const deleteBtn = card.querySelector('[data-action="delete"]');
    const confirmBtn = card.querySelector('[data-action="confirm-delete"]');
    deleteBtn.style.display = 'none';
    confirmBtn.style.display = 'inline-block';
    confirmBtn._timeout = setTimeout(() => {
      deleteBtn.style.display = '';
      confirmBtn.style.display = 'none';
    }, 3000);
    return;
  }

  if(action === 'confirm-delete'){
    clearTimeout(e.target.closest('[data-action="confirm-delete"]')._timeout);
    notes = notes.filter(n => n.id !== id);
    saveNotes(notes);
    render();
    return;
  }

  if(action === 'edit'){
    card.classList.add('editing');
    const titleField = card.querySelector('.edit-title');
    titleField.focus();
    titleField.setSelectionRange(titleField.value.length, titleField.value.length);
  }

  if(action === 'cancel-edit'){
    card.classList.remove('editing');
    card.querySelector('.field')?.classList.remove('has-error');
    card.querySelectorAll('.field').forEach(f => f.classList.remove('has-error'));
  }
});

grid.addEventListener('submit', (e) => {
  const editForm = e.target.closest('[data-action="save-edit"]');
  if(!editForm) return;
  e.preventDefault();

  const card = editForm.closest('.note');
  const id = card.dataset.id;
  const titleEl = editForm.querySelector('.edit-title');
  const contentEl = editForm.querySelector('.edit-content');
  const titleFieldEl = titleEl.closest('.field');
  const contentFieldEl = contentEl.closest('.field');

  const titleOk = titleEl.value.trim().length > 0;
  const contentOk = contentEl.value.trim().length > 0;
  titleFieldEl.classList.toggle('has-error', !titleOk);
  contentFieldEl.classList.toggle('has-error', !contentOk);
  if(!titleOk || !contentOk) return;

  const note = notes.find(n => n.id === id);
  if(note){
    note.title = titleEl.value.trim();
    note.content = contentEl.value.trim();
    note.updatedAt = new Date().toISOString();
    saveNotes(notes);
  }
  render();
});

// live-clear inline edit errors as user types
grid.addEventListener('input', (e) => {
  if(e.target.classList.contains('edit-title') && e.target.value.trim().length > 0){
    e.target.closest('.field').classList.remove('has-error');
  }
  if(e.target.classList.contains('edit-content') && e.target.value.trim().length > 0){
    e.target.closest('.field').classList.remove('has-error');
  }
});

searchInput.addEventListener('input', () => {
  query = searchInput.value;
  render();
});

render();
// refresh relative timestamps periodically without disrupting an in-progress edit
setInterval(() => {
  if(document.querySelector('.note.editing')) return;
  render();
}, 30000);
</script>
</body>
</html>
